<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
        
        <style>
            html, body, #map {
                width: 100%; height: 100%; padding: 0; margin: 0;
                font-family: 'Poppins', sans-serif;
                background: #f4f7f6;
            }

            /* --- NAVIGATION BAR GEMPAK --- */
            .navbar {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 70px;
                background: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(12px); /* Kesan Blur Modern */
                -webkit-backdrop-filter: blur(12px);
                z-index: 2000;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 30px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.1);
                border-bottom: 2px solid #2ecc71;
            }

            .nav-brand {
                display: flex;
                align-items: center;
                gap: 15px;
            }

            .web-logo {
                height: 50px;
                transition: transform 0.3s;
            }
            
            .web-logo:hover { transform: scale(1.1); }

            .brand-text h1 {
                margin: 0;
                font-size: 18px;
                color: #2c3e50;
                text-transform: uppercase;
                letter-spacing: 1px;
            }
            .brand-text span {
                font-size: 11px;
                color: #27ae60;
                font-weight: 600;
            }

            .nav-menu {
                display: flex;
                gap: 20px;
            }

            .nav-item {
                text-decoration: none;
                color: #34495e;
                font-size: 13px;
                font-weight: 600;
                padding: 8px 15px;
                border-radius: 8px;
                transition: 0.3s;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .nav-item:hover {
                background: #2ecc71;
                color: white;
            }

            /* --- FLOATING STATS PANEL --- */
            .stats-panel {
                position: absolute;
                bottom: 30px;
                left: 20px;
                z-index: 1000;
                background: white;
                padding: 15px;
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.2);
                border-left: 5px solid #2ecc71;
            }

            /* --- POPUP STYLING --- */
            .leaflet-popup-content-wrapper {
                border-radius: 12px;
                padding: 5px;
            }
            .popup-header {
                background: #2ecc71;
                color: white;
                margin: -15px -15px 10px -15px;
                padding: 10px;
                border-radius: 10px 10px 0 0;
                text-align: center;
                font-weight: 600;
            }

            /* Adjust map position for navbar */
            #map { margin-top: 0px; }
            
            /* Gempakkan Search Box */
            .leaflet-control-search {
                margin-top: 85px !important; /* Elak bertindih navbar */
                border: 2px solid #2ecc71 !important;
                border-radius: 10px !important;
            }
        </style>
        <title>GeoPortal Lot Tanah PUO</title>
    </head>
    <body>

        <nav class="navbar">
            <div class="nav-brand">
                <img src="LOGOPOLI.png" alt="PUO Logo" class="web-logo">
                <div class="brand-text">
                    <h1>GeoPortal Lot Tanah</h1>
                    <span>POLITEKNIK UNGKU OMAR</span>
                </div>
            </div>
            
            <div class="nav-menu">
                <a href="#" class="nav-item"><i class="fas fa-home"></i> Utama</a>
                <a href="#" class="nav-item" onclick="map.setView([2.1037, 102.5223], 19)"><i class="fas fa-bullseye"></i> Fokus Lot</a>
                <a href="#" class="nav-item" onclick="window.print()"><i class="fas fa-print"></i> Cetak Pelan</a>
            </div>
        </nav>

        <div class="stats-panel">
            <div style="font-size: 10px; color: #7f8c8d;">STATUS SISTEM</div>
            <div style="font-weight: 700; color: #2c3e50;"><i class="fas fa-check-circle" style="color: #2ecc71;"></i> GPS Aktif</div>
            <div style="font-size: 11px; margin-top: 5px;">Sempadan: <span style="color: #e74c3c;">Tanda Merah</span></div>
        </div>

        <div id="map"></div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet-search.js"></script>
        
        <script src="data/LOTFINAL_0.js"></script>
        <script src="data/MERGETANDASEMPADAN_1.js"></script>

        <script>
        var map = L.map('map', {
            zoomControl:false, 
            maxZoom:28, 
            minZoom:1
        }).fitBounds([[2.1030, 102.5210],[2.1044, 102.5235]]);

        /* --- BASEMAPS --- */
        var googleSat = L.tileLayer('http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{
            maxZoom: 20,
            subdomains:['mt0','mt1','mt2','mt3'],
            attribution: 'Google Satellite'
        });

        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        /* --- ZOOM CONTROL POSITION --- */
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        /* --- POPUP CUSTOM --- */
        function pop_LOT(feature, layer) {
            var content = '<div class="popup-header">DETAIL LOT</div>' +
                          '<table>' +
                          '<tr><td><b>No Lot:</b></td><td>' + feature.properties['NO_LOT'] + '</td></tr>' +
                          '<tr><td><b>Keluasan:</b></td><td>' + feature.properties['AREA'] + ' m²</td></tr>' +
                          '</table>';
            layer.bindPopup(content);
        }

        /* --- STYLE LOT --- */
        var layer_LOTFINAL_0 = new L.geoJson(json_LOTFINAL_0, {
            style: {
                color: '#ffffff',
                weight: 2,
                fillColor: '#2ecc71',
                fillOpacity: 0.5
            },
            onEachFeature: pop_LOT
        }).addTo(map);

        /* --- LAYER SEMPADAN --- */
        var layer_MERGETANDASEMPADAN_1 = new L.geoJson(json_MERGETANDASEMPADAN_1, {
            pointToLayer: function (feature, latlng) {
                return L.circleMarker(latlng, {
                    radius: 6,
                    fillColor: "#e74c3c",
                    color: "#fff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.9
                });
            }
        }).addTo(map);

        /* --- LAYER CONTROL --- */
        var baseMaps = { "Peta Jalan": osm, "Satelit": googleSat };
        var overlayMaps = { "Lot Tanah": layer_LOTFINAL_0, "Tanda Sempadan": layer_MERGETANDASEMPADAN_1 };
        L.control.layers(baseMaps, overlayMaps, {collapsed: false, position: 'topright'}).addTo(map);

        /* --- SEARCH FUNCTION --- */
        map.addControl(new L.Control.Search({
            layer: layer_LOTFINAL_0,
            propertyName: 'NO_LOT',
            initial: false,
            zoom: 19,
            marker: false
        }));

        </script>         
    </body>
</html>
